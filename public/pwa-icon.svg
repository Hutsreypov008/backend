<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad)"/>
  <!-- Flower petals -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(120)"/>
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(240)"/>
    <ellipse cx="0" cy="-90" rx="40" ry="65" fill="rgba(255,255,255,0.9)" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="30" fill="#fce7f3"/>
    <circle cx="0" cy="0" r="20" fill="#fbcfe8"/>
    <circle cx="0" cy="0" r="10" fill="#f9a8d4"/>
  </g>
</svg>
